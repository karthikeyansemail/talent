version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talent-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - AI_SERVICE_URL=http://ai-service:8000
    networks:
      - talent-network

  nginx:
    image: nginx:alpine
    container_name: talent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - talent-network

  db:
    image: mysql:8.0
    container_name: talent-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: talent_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: talent_user
      MYSQL_PASSWORD: talent_pass
    ports:
      - "3307:3306"
    volumes:
      - talent-db-data:/var/lib/mysql
    networks:
      - talent-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: talent-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    networks:
      - talent-network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talent-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - AI_SERVICE_URL=http://ai-service:8000
    networks:
      - talent-network

volumes:
  talent-db-data:

networks:
  talent-network:
    driver: bridge
