name: Build & Publish Docker Images

# Triggers:
#   - Push a version tag: git tag v1.2.3 && git push origin v1.2.3
#   - Manual trigger from GitHub Actions UI
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.2.3 or latest)'
        required: true
        default: 'latest'

env:
  DOCKERHUB_ORG: nalampulse

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            # Strip 'refs/tags/' prefix → v1.2.3
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Laravel app image (uses Dockerfile.prod = Apache, production-optimised) ─
      - name: Build & push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKERHUB_ORG }}/app:latest
            ${{ env.DOCKERHUB_ORG }}/app:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── AI service image ───────────────────────────────────────────────────
      - name: Build & push ai-service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          file: ./ai-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_ORG }}/ai-service:latest
            ${{ env.DOCKERHUB_ORG }}/ai-service:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`nalampulse/app:${{ steps.tag.outputs.TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`nalampulse/ai-service:${{ steps.tag.outputs.TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Customers with active subscriptions can pull: \`docker pull nalampulse/app:latest\`" >> $GITHUB_STEP_SUMMARY
