# =============================================================================
# Nalam Pulse — Self-Hosted Docker Compose (Production)
# Images pulled from Docker Hub — no source code required.
#
# The app container runs Apache + PHP internally.
# Host nginx (set up by install.sh) handles SSL and proxies to port 8080.
# =============================================================================

x-app-env: &app-env
  APP_NAME: "${APP_NAME:-Nalam Pulse}"
  APP_ENV: "${APP_ENV:-production}"
  APP_DEBUG: "${APP_DEBUG:-false}"
  APP_KEY: "${APP_KEY}"
  APP_URL: "${APP_URL}"
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: "${DB_DATABASE:-talent_db}"
  DB_USERNAME: "${DB_USERNAME:-talent}"
  DB_PASSWORD: "${DB_PASSWORD}"
  CACHE_DRIVER: file
  SESSION_DRIVER: file
  QUEUE_CONNECTION: database
  MAIL_MAILER: smtp
  MAIL_HOST: "${MAIL_HOST}"
  MAIL_PORT: "${MAIL_PORT:-587}"
  MAIL_USERNAME: "${MAIL_USERNAME}"
  MAIL_PASSWORD: "${MAIL_PASSWORD}"
  MAIL_ENCRYPTION: tls
  MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
  MAIL_FROM_NAME: "Nalam Pulse"
  AI_SERVICE_URL: "http://ai-service:8000"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  NALAM_LICENSE_KEY: "${NALAM_LICENSE_KEY}"

services:

  # ── Laravel application (Apache + PHP, serves HTTP on port 8080) ───────────
  app:
    image: nalampulse/app:${NALAM_APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      <<: *app-env
    volumes:
      - app-storage:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - internal

  # ── Queue worker ───────────────────────────────────────────────────────────
  queue-worker:
    image: nalampulse/app:${NALAM_APP_VERSION:-latest}
    restart: unless-stopped
    entrypoint: []
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Task scheduler ─────────────────────────────────────────────────────────
  scheduler:
    image: nalampulse/app:${NALAM_APP_VERSION:-latest}
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "while true; do php artisan schedule:run >> /dev/null 2>&1; sleep 60; done"
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Python AI service (open source: github.com/nalampulse/ai-service) ─────
  ai-service:
    image: nalampulse/ai-service:${NALAM_APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    networks:
      - internal

  # ── MySQL database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE:-talent_db}"
      MYSQL_USER: "${DB_USERNAME:-talent}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - internal

volumes:
  db-data:
  app-storage:

networks:
  internal:
    driver: bridge
